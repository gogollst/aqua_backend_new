name: docker-build

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service name (matches src/Aqua.<Service>)'
        required: true
        type: string
      tag:
        description: 'Image tag'
        required: true
        default: 'dev'
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # secrets.X is forbidden in step-level if-conditions; lift to job env.
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        if: env.REGISTRY_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Aqua.${{ inputs.service }}/Dockerfile
          push: ${{ env.REGISTRY_USERNAME != '' }}
          tags: ghcr.io/aqua-cloud/aqua-${{ inputs.service }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
