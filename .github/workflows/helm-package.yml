name: helm-package

on:
  workflow_dispatch:
    inputs:
      chart:
        description: 'Chart name (subfolder of deploy/helm/)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      # secrets.X is forbidden in step-level if-conditions; lift to job env.
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint
        run: helm lint deploy/helm/${{ inputs.chart }}

      - name: Package
        run: |
          mkdir -p artifacts
          helm package deploy/helm/${{ inputs.chart }} -d artifacts

      - name: Login to OCI registry
        if: env.REGISTRY_USERNAME != ''
        run: echo "$REGISTRY_PASSWORD" | helm registry login ghcr.io -u "$REGISTRY_USERNAME" --password-stdin

      - name: Push
        if: env.REGISTRY_USERNAME != ''
        run: helm push artifacts/${{ inputs.chart }}-*.tgz oci://ghcr.io/aqua-cloud/charts
