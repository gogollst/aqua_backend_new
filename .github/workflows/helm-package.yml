name: helm-package

on:
  workflow_dispatch:
    inputs:
      chart:
        description: 'Chart name (subfolder of deploy/helm/)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lint
        run: helm lint deploy/helm/${{ inputs.chart }}

      - name: Package
        run: |
          mkdir -p artifacts
          helm package deploy/helm/${{ inputs.chart }} -d artifacts

      - name: Login to OCI registry
        if: ${{ secrets.REGISTRY_USERNAME != '' }}
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | helm registry login ghcr.io -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Push
        if: ${{ secrets.REGISTRY_USERNAME != '' }}
        run: helm push artifacts/${{ inputs.chart }}-*.tgz oci://ghcr.io/aqua-cloud/charts
