name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Lift SONAR_TOKEN to job env so step-level `if:` can read it via env.X.
      # GitHub disallows secrets.X in step-level if-conditions since 2022 (info-leak guard).
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # SonarCloud needs full history

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install SonarCloud scanner
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage

      - name: SonarCloud begin
        if: env.SONAR_TOKEN != ''
        run: >
          dotnet sonarscanner begin
          /k:"aqua-cloud_aqua-backend-ng"
          /o:"aqua-cloud"
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.opencover.reportsPaths="TestResults/**/coverage.opencover.xml"

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (with coverage)
        run: |
          dotnet test --no-build --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect "XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Coverage merge (opencover format)
        run: dotnet-coverage merge TestResults/**/*.coverage -f opencover -o TestResults/coverage.opencover.xml

      - name: SonarCloud end
        if: env.SONAR_TOKEN != ''
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: TestResults/**/coverage.cobertura.xml
