name: aqua-ng-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: aqua-postgres
    environment:
      POSTGRES_USER: aqua
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aqua-dev}
      POSTGRES_DB: aqua
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aqua -d aqua"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: aqua-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-aqua}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-aqua-dev}
      RABBITMQ_LOAD_DEFINITIONS: /etc/rabbitmq/definitions.json
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    volumes:
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: aqua-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aqua-dev}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aqua-dev-secret}
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: aqua-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh /scripts/createbuckets.sh
    volumes:
      - ./docker/minio/createbuckets.sh:/scripts/createbuckets.sh:ro
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: aqua-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-aqua-dev}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-aqua-dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: aqua-mailhog
    ports:
      - "1025:1025"     # SMTP
      - "8025:8025"     # Web UI

volumes:
  postgres-data:
  rabbitmq-data:
  minio-data:
  redis-data:
