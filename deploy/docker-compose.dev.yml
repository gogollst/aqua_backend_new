name: aqua-ng-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: aqua-postgres
    environment:
      POSTGRES_USER: aqua
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aqua-dev}
      POSTGRES_DB: aqua
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aqua -d aqua"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: aqua-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-aqua}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-aqua-dev}
      RABBITMQ_LOAD_DEFINITIONS: /etc/rabbitmq/definitions.json
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    volumes:
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: aqua-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-aqua-dev}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-aqua-dev-secret}
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: aqua-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh /scripts/createbuckets.sh
    volumes:
      - ./docker/minio/createbuckets.sh:/scripts/createbuckets.sh:ro
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: aqua-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-aqua-dev}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-aqua-dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: aqua-mailhog
    ports:
      - "1025:1025"     # SMTP
      - "8025:8025"     # Web UI

  identity-service:
    build:
      context: ../
      dockerfile: src/Aqua.IdentityService/Dockerfile
    container_name: aqua-identity-service
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Identity__Issuer: "https://identity.aqua/dev"
      Identity__Audience: "aqua-api"
      Identity__RsaPrivateKeyPath: "/secrets/private.pem"
      Identity__RsaPublicKeyPath: "/secrets/public.pem"
      AquaData__Tenants__acme__Dbms: "Postgres"
      AquaData__Tenants__acme__ConnectionString: "Host=postgres;Port=5432;Database=aqua_acme;Username=aqua;Password=${POSTGRES_PASSWORD:-aqua-dev}"
      AquaData__Tenants__default__Dbms: "Postgres"
      AquaData__Tenants__default__ConnectionString: "Host=postgres;Port=5432;Database=aqua_default;Username=aqua;Password=${POSTGRES_PASSWORD:-aqua-dev}"
    volumes:
      - ./secrets/identity:/secrets:ro

  api-gateway:
    build:
      context: ../
      dockerfile: src/Aqua.ApiGateway/Dockerfile
    container_name: aqua-api-gateway
    depends_on:
      identity-service:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Gateway__JwtAuthority: "http://identity-service:8080"
      Gateway__JwtAudience: "aqua-api"
      Gateway__JwtRequireHttpsMetadata: "false"
      Gateway__Services__0__Name: "identity"
      Gateway__Services__0__BaseUrl: "http://identity-service:8080"
      Gateway__Services__0__PathPrefix: "/api/v1/auth"
      Gateway__Services__0__AnonymousPaths__0: "/token"
      Gateway__Services__0__AnonymousPaths__1: "/refresh"
      Gateway__Services__1__Name: "identity-disco"
      Gateway__Services__1__BaseUrl: "http://identity-service:8080"
      Gateway__Services__1__PathPrefix: "/.well-known"
      Gateway__Services__1__AnonymousPaths__0: "*"
      TenantResolution__Mode: "Default"
      TenantResolution__DefaultTenant: "default"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  rabbitmq-data:
  minio-data:
  redis-data:
